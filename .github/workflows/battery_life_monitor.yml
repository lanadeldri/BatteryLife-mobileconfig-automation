name: BatteryLife Mobileconfig Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
      timezone: "America/Chicago"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Prepare monitor directories
        run: mkdir -p monitor_data

      - name: Run monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          APPLE_AUTH_STATE_BASE64: ${{ secrets.APPLE_AUTH_STATE_BASE64 }}
        run: python battery_life_monitor.py

      - name: Commit updated state
        run: |
          if git diff --quiet -- monitor_data/state.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monitor_data/state.json
          git commit -m "Update BatteryLife monitor state"
          git push
